<div class="card p-3 bg-info bg-opacity-10 text-light text-opacity-75 border-2 border-info border-opacity-25 
 d-flex flex-column h-100 w-100">
  <div class="card-body d-flex flex-column">
    <h3 class="font-monospace text-center">**{{ data().titolo }}**</h3>
    <p>{{ data().descrizione }} - {{data().codiceCorso}}</p>
    <div class="card-text py-3 bg-info bg-opacity-25 m-2 p-3 d-flex rounded-4">
      <ul>
        <li>Livello: {{ data().livello }}</li>
        <li>Durata: {{ data().durataOre }} ore</li>
        <li>Descrizione: {{data().descrizione}}</li>
      </ul>
    </div>
  </div>
</div>
