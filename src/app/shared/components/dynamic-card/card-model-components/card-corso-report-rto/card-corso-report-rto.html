<div
    class="card p-3 bg-info bg-opacity-10 text-light text-opacity-75 border-2 border-info border-opacity-25 d-flex flex-column h-100 w-100">
    <h3>{{ data().titolo }}</h3>
    <div class="card-body d-flex flex-column">
        <div class="card-text py-3 bg-info bg-opacity-25 m-2 p-3 rounded-4">
            <ul>
                <h4>Iscrizioni</h4>
                <li>Attive: {{ data().iscrizioni.iscrizioniAttive }}</li>
                <h4>Valutazioni</h4>
                <li>Media voto: {{ data().valutazioni.mediaVoto }}</li>
                <li>Numero valutazioni: {{ data().valutazioni.numeroValutazioni }}</li>
            </ul>
        </div>
    </div>
</div>
