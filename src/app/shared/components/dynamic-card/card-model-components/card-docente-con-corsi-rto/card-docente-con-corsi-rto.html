<div
    class="card p-3 bg-info bg-opacity-10 text-light text-opacity-75 border-2 border-info border-opacity-25 d-flex flex-column h-100 w-100">
    <h3>{{ data().nome }} {{ data().cognome }}</h3>
    <div class="card-body d-flex flex-column">
        <div class="card-text py-3 bg-info bg-opacity-25 m-2 p-3 rounded-4">
            <h4 class="font-monospace text-center">Corsi</h4>
            <ul>
                @for (c of data().corsi; track $index) {
                <li>
                    {{ c.titolo }} ({{ c.livello }})
                </li>
                }
            </ul>
        </div>
    </div>
</div>
