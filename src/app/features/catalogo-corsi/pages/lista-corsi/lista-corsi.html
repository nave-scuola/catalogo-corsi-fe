<div class="container mt-4">
  <h1 class="m-4 text-center text-info text-opacity-75">{{ titolo }}</h1>

  <input type="text" placeholder="Filtra corsi tramite titolo, codice o descrizione" [value]="filtroTesto()"
    (input)="filtroTesto.set($any($event.target).value)" 
    class="form-control mb-3 border-2 border-info border-opacity-50 bg-black text-light" />

  <div class="row g-3">
    @for (card of listaCardsFiltrati(); track $index) {
    <div class="col-md-4">
      <app-dynamic-card-container [data]="card"></app-dynamic-card-container>
    </div>
    }
  </div>

</div>
